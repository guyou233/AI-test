<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tank Battle</title>
<style>
  body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, sans-serif;
    background: radial-gradient(circle at center, #444, #111);
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  #title {
    font-size: 2em;
    margin: 20px 0 10px;
    text-shadow: 0 0 8px #000;
  }
  canvas {
    background: #222;
    border: 2px solid #555;
    box-shadow: 0 0 10px #000;
    display: block;
    margin: 0 auto;
  }
  #instructions {
    margin-top: 10px;
    font-size: 0.9em;
  }
  #instructions span.red { color: #f55; }
  #instructions span.green { color: #5f5; }
  #message {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.8);
    padding: 20px 40px;
    border-radius: 8px;
    font-size: 1.5em;
    box-shadow: 0 0 10px #000;
  }
</style>
</head>
<body>
<div id="title">Tank Battle</div>
<canvas id="game" width="600" height="400"></canvas>
<div id="message"></div>
<div id="instructions">
  Player 1: <span class="green">WASD</span> move, <span class="green">F</span> fire.<br>
  Player 2: <span class="red">Arrow keys</span> move, <span class="red">L</span> fire.
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const message = document.getElementById('message');
const keys = {};
let gameOver = false;

window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => delete keys[e.key]);

function Tank(x, y, color, controls) {
  this.x = x; this.y = y; this.dir = 0; this.color = color;
  this.controls = controls; // {up,down,left,right,fire}
  this.bullets = [];
  this.update = () => {
    if (keys[this.controls.left]) this.dir -= 0.05;
    if (keys[this.controls.right]) this.dir += 0.05;
    const speed = 2;
    if (keys[this.controls.up]) {
      this.x += Math.cos(this.dir) * speed;
      this.y += Math.sin(this.dir) * speed;
    }
    if (keys[this.controls.down]) {
      this.x -= Math.cos(this.dir) * speed;
      this.y -= Math.sin(this.dir) * speed;
    }
    this.x = Math.max(10, Math.min(canvas.width - 10, this.x));
    this.y = Math.max(10, Math.min(canvas.height - 10, this.y));
    if (keys[this.controls.fire]) this.fire();
    this.bullets.forEach(b => b.update());
    this.bullets = this.bullets.filter(b => !b.dead);
  };
  this.fire = () => {
    if (!this.lastFire || Date.now() - this.lastFire > 400) {
      this.lastFire = Date.now();
      this.bullets.push(new Bullet(this.x, this.y, this.dir, this.color));
    }
  };
  this.draw = () => {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.dir);
    ctx.fillStyle = this.color;
    ctx.fillRect(-12, -8, 24, 16);
    ctx.fillRect(0, -4, 18, 8);
    ctx.restore();
    this.bullets.forEach(b => b.draw());
  };
}

function Bullet(x, y, dir, color) {
  this.x = x; this.y = y; this.dir = dir; this.color = color; this.dead = false;
  this.update = () => {
    this.x += Math.cos(this.dir) * 4;
    this.y += Math.sin(this.dir) * 4;
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.dead = true;
  };
  this.draw = () => {
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
    ctx.fill();
  };
}

const p1 = new Tank(100, 200, '#0f0', {up:'w',down:'s',left:'a',right:'d',fire:'f'});
const p2 = new Tank(500, 200, '#f00', {up:'ArrowUp',down:'ArrowDown',left:'ArrowLeft',right:'ArrowRight',fire:'l'});

function checkHit(bullet, tank) {
  const dx = bullet.x - tank.x;
  const dy = bullet.y - tank.y;
  return Math.hypot(dx, dy) < 15;
}

function declareWinner(text) {
  message.textContent = text + ' Wins!';
  message.style.display = 'block';
  gameOver = true;
}

function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  p1.update();
  p2.update();
  p1.bullets.forEach(b => { if (checkHit(b, p2)) { b.dead = true; declareWinner('Player 1'); }});
  p2.bullets.forEach(b => { if (checkHit(b, p1)) { b.dead = true; declareWinner('Player 2'); }});
  p1.draw();
  p2.draw();
  if (!gameOver) requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
